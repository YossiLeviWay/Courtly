[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — send all non-asset requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["*"]}

# NOTE: Netlify Functions v2 path configs (inside each .js file) take
# priority over redirects, so /api/* routes are handled by the functions
# without needing explicit redirect rules here.
