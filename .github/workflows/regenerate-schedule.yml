name: Regenerate Season Schedule

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "regenerate" to confirm resetting all matches and standings'
        required: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'regenerate'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Regenerate schedule
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/regenerate-schedule.mjs
